<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <style>
        .form{
            background-color: rgb(242, 238, 241);
            width: 100%;
            height: 100%;
            padding: 20px;
            border-radius: 30px;
            text-align: center;
            border: black 3px solid;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-size-adjust: initial;

        }

        </style>
        <style>
            input{
                width: 50%;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
                border: 1px solid #000000;
                box-sizing: border-box;
                border-color: black;
                text-align: center;

            }
        </style>
</head>
<body>
    <form>
        <div class="form">
        <h1>Every Student fillup the form </h1>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <br><br>   
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <br><br>
        <label for ="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
        <br><br>
        <label for ="gender">Gender:</label>   
        <select id="gender" name="gender">
        <option for="male">Male</option>
        <option for="female">Female</option>
        <option for="other">Other</option>
        </select>
        <br><br>
        <label for="course">Course:</label>
        <input type="text" id="course" name="course" placeholder="Enter your course">
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <br><br>
        <label for="address">Address:</label>
        <input id="address" name="address" placeholder="Enter your address"></input>
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <br><br>
        <label for="Confirm Password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password">
        <br><br>
        <input type="submit" value="Submit">
    </form>
    </div>
</body>
</html>
